name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# 🔹 GLOBAL ENVIRONMENT VARIABLES DEFINED HERE
env:
  ASTRO_TELEMETRY_DISABLED: true
  PUBLIC_URLBASE: https://drroksanapb.com/  # 👈 Added your custom public URL variable

jobs:
  build:
    name: Build Astro Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install, cache, and build Site
        uses: withastro/action@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
